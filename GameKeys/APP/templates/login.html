<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GameKeys</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="/static/css/estilos.css">
</head>
<body>
<div class="login-bg">
  <div class="login-box w3-card">
    <!-- Logo -->
    <div class="text-center mb-4">
      <a href="/index.html" class="navbar-brand">
        <span class="logo-gk" style="font-size:1.8rem;">🎮 GameKeys</span>
      </a>
      <p style="color:#64748b;font-size:0.85rem;margin-top:0.5rem;">Tu tienda de claves digitales</p>
    </div>

    <!-- Tabs -->
    <div class="login-tab-bar">
      <div class="login-tab active" onclick="showTab('login')">Iniciar Sesión</div>
      <div class="login-tab" onclick="showTab('register')">Registrarse</div>
      <div class="login-tab" onclick="showTab('admin')">Admin</div>
    </div>

    <!-- LOGIN TAB -->
    <div id="tab-login">
      <form onsubmit="doLogin(event)">
        <div class="mb-3">
          <label class="form-label">📧 Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="tu@email.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">🔐 Contraseña</label>
          <div class="input-group">
            <input type="password" id="login-pass" class="form-control" placeholder="••••••••" required>
            <button type="button" class="btn btn-outline-secondary" style="border-color:var(--input-border);background:var(--input-bg);"
                    onclick="togglePass('login-pass',this)">👁️</button>
          </div>
        </div>
        <div id="login-error" class="alerta-err mb-3" style="display:none;"></div>
        <button type="submit" class="btn btn-violeta w-100 py-2">Iniciar Sesión</button>
      </form>
      <div class="text-center mt-3">
        <span style="color:#64748b;font-size:0.85rem;">¿No tienes cuenta?</span>
        <a href="#" onclick="showTab('register')" style="color:var(--violet);font-size:0.85rem;"> Regístrate aquí</a>
      </div>
    </div>

    <!-- REGISTER TAB -->
    <div id="tab-register" style="display:none;">
      <form onsubmit="doRegister(event)">
        <div class="mb-3">
          <label class="form-label">👤 Nombre completo</label>
          <input type="text" id="reg-nombre" class="form-control" placeholder="Tu nombre" required>
        </div>
        <div class="mb-3">
          <label class="form-label">📧 Email</label>
          <input type="email" id="reg-email" class="form-control" placeholder="tu@email.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">🔐 Contraseña</label>
          <div class="input-group">
            <input type="password" id="reg-pass" class="form-control" placeholder="Mínimo 6 caracteres" required>
            <button type="button" class="btn btn-outline-secondary" style="border-color:var(--input-border);background:var(--input-bg);"
                    onclick="togglePass('reg-pass',this)">👁️</button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">🔐 Confirmar contraseña</label>
          <div class="input-group">
            <input type="password" id="reg-pass2" class="form-control" placeholder="Repite tu contraseña" required>
            <button type="button" class="btn btn-outline-secondary" style="border-color:var(--input-border);background:var(--input-bg);"
                    onclick="togglePass('reg-pass2',this)">👁️</button>
          </div>
        </div>
        <div id="reg-error" class="alerta-err mb-3" style="display:none;"></div>
        <div id="reg-ok" class="alerta-ok mb-3" style="display:none;">
          ✅ ¡Cuenta creada! Redirigiendo...
        </div>
        <button type="submit" class="btn btn-violeta w-100 py-2">Crear Cuenta</button>
      </form>
    </div>

    <!-- ADMIN TAB -->
    <div id="tab-admin" style="display:none;">
      <div class="hint-box mb-3">
        🔑 <strong>Credenciales demo:</strong><br>
        Email: <code>admin@gamekeys.com</code><br>
        Contraseña: <code>admin123</code>
      </div>
      <form onsubmit="doAdminLogin(event)">
        <div class="mb-3">
          <label class="form-label">📧 Email admin</label>
          <input type="email" id="admin-email" class="form-control" placeholder="admin@gamekeys.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">🔐 Contraseña</label>
          <div class="input-group">
            <input type="password" id="admin-pass" class="form-control" placeholder="••••••••" required>
            <button type="button" class="btn btn-outline-secondary" style="border-color:var(--input-border);background:var(--input-bg);"
                    onclick="togglePass('admin-pass',this)">👁️</button>
          </div>
        </div>
        <div id="admin-error" class="alerta-err mb-3" style="display:none;"></div>
        <button type="submit" class="btn btn-violeta w-100 py-2">⚙️ Acceder al Panel</button>
      </form>
    </div>

    <div class="text-center mt-4">
      <a href="/index.html" style="color:#64748b;font-size:0.85rem;">← Volver al inicio</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showTab(tab) {
  ['login','register','admin'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.login-tab').forEach((el, i) => {
    el.classList.toggle('active', ['login','register','admin'][i] === tab);
  });
}

function togglePass(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}

async function doLogin(e) {
  e.preventDefault();

  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-error');

  const res = await fetch('/api/usuarios/login/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      email: email,
      password: pass
    })
  });

  const data = await res.json();

  if (!data.ok) {
    err.textContent = '❌ ' + data.error;
    err.style.display = '';
    return;
  }

  err.style.display = 'none';

  localStorage.setItem('gk_usuario', JSON.stringify(data.usuario));
  window.location.href = '/index.html';
}

async function doRegister(e) {
  e.preventDefault();

  const nombre = document.getElementById('reg-nombre').value.trim();
  const email  = document.getElementById('reg-email').value.trim();
  const pass   = document.getElementById('reg-pass').value;
  const pass2  = document.getElementById('reg-pass2').value;
  const err    = document.getElementById('reg-error');
  const ok     = document.getElementById('reg-ok');

  if (pass !== pass2) {
    err.textContent = '⚠️ Las contraseñas no coinciden';
    err.style.display = '';
    ok.style.display = 'none';
    return;
  }

  const res = await fetch('/api/usuarios/registro/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      nombre: nombre,
      email: email,
      password: pass
    })
  });

  const data = await res.json();

  if (!data.ok) {
    err.textContent = '❌ ' + data.error;
    err.style.display = '';
    ok.style.display = 'none';
    return;
  }

  err.style.display = 'none';
  ok.style.display = '';

  localStorage.setItem('gk_usuario', JSON.stringify(data.usuario));

  setTimeout(() => {
    window.location.href = '/index.html';
  }, 1200);
}

function doAdminLogin(e) {
  e.preventDefault();
  const email = document.getElementById('admin-email').value.trim();
  const pass  = document.getElementById('admin-pass').value;
  const err   = document.getElementById('admin-error');

  if (email === 'admin@gamekeys.com' && pass === 'admin123') {
    const u = { nombre: 'Administrador', email, rol: 'admin' };
    localStorage.setItem('gk_usuario', JSON.stringify(u));
    window.location.href = '/admin.html';
  } else {
    err.textContent = '❌ Credenciales de administrador incorrectas';
    err.style.display = '';
  }
}

// Check if already logged in
const u = JSON.parse(localStorage.getItem('gk_usuario') || 'null');
if (u) window.location.href = '/index.html';
</script>
</body>
</html>
