<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - GameKeys</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="/static/css/estilos.css">
</head>
<body>

<!-- ADMIN NAVBAR -->
<nav class="navbar fondo-navbar sticky-top">
  <div class="container">
    <span class="navbar-brand"><span class="logo-gk">🎮 GameKeys</span> <span style="color:#64748b;font-size:0.75rem;margin-left:4px;">Admin Panel</span></span>
    <div class="d-flex gap-2">
      <a href="/index.html" class="btn btn-outline-violeta btn-sm">🏠 Ver tienda</a>
      <button class="btn btn-sm" style="background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.4);"
              onclick="salirAdmin()">🚪 Salir</button>
    </div>
  </div>
</nav>

<div class="container py-5">
  <h1 class="section-title">⚙️ Panel de <span>Juegos</span></h1>

  <!-- ADD GAME FORM -->
  <div class="admin-box mb-5">
    <h5 class="mb-4" style="color:#f1f5f9;">➕ Añadir Nuevo Juego</h5>
    <form id="form-add-game" onsubmit="addGame(event)">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre del juego <span class="text-danger">*</span></label>
          <input type="text" id="g-nombre" class="form-control" placeholder="Ej: Cyberpunk 2077" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Precio (€) <span class="text-danger">*</span></label>
          <input type="number" id="g-precio" class="form-control" placeholder="29.99" step="0.01" min="0" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Stock <span class="text-danger">*</span></label>
          <input type="number" id="g-stock" class="form-control" placeholder="10" min="0" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Descripción <span class="text-danger">*</span></label>
          <textarea id="g-desc" class="form-control" rows="3" placeholder="Descripción del juego..." required></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Géneros <span class="text-danger">*</span></label>
          <div id="admin-genero-btns" class="d-flex flex-wrap gap-2 mb-1">
            <!-- rendered by JS -->
          </div>
          <input type="hidden" id="g-genero">
          <div id="genero-error" class="text-danger small" style="display:none;">Selecciona un género</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">URL de imagen</label>
          <input type="url" id="g-imagen" class="form-control" placeholder="https://...">
        </div>
        <div class="col-md-3">
          <label class="form-label">Desarrollador</label>
          <input type="text" id="g-dev" class="form-control" placeholder="Studio Name">
        </div>
        <div class="col-md-3">
          <label class="form-label">Descuento (%)</label>
          <input type="number" id="g-descuento" class="form-control" placeholder="0" min="0" max="90">
        </div>
        <div class="col-md-6">
          <label class="form-label">Video URL (YouTube embed)</label>
          <input type="url" id="g-video" class="form-control" placeholder="https://www.youtube.com/embed/...">
        </div>
        <div class="col-12">
          <label class="form-label">Plataformas</label>
          <div class="d-flex flex-wrap gap-2" id="admin-plat-btns">
            <!-- rendered by JS -->
          </div>
        </div>
      </div>
      <div class="mt-4">
        <button type="submit" class="btn btn-violeta px-4">➕ Añadir Juego</button>
      </div>
    </form>
  </div>

  <!-- GAME LIST -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h5 style="color:#f1f5f9;">📋 Juegos registrados</h5>
    <span class="badge" style="background:rgba(168,85,247,0.2);color:var(--violet);font-size:0.9rem;" id="admin-count">0 juegos</span>
  </div>
  <div class="row" id="admin-juegos-list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
<script>
let adminJuegos = [];
const PLATAFORMAS_LIST = ['Steam','Epic','PlayStation','Xbox','Nintendo Switch','PC'];
let selectedGenero = '';
let selectedPlats  = new Set();

function salirAdmin() {
  localStorage.removeItem('gk_usuario');
  window.location.href = '/login.html';
}

function initPagina() {
  const u = getUsuario();
  if (!u || u.rol !== 'admin') {
    window.location.href = '/login.html';
    return;
  }

  // Load from localStorage (user-added games) + static games
  const extras = JSON.parse(localStorage.getItem('gk_admin_juegos') || '[]');
  adminJuegos = [...JUEGOS, ...extras];

  renderGenerosBtns();
  renderPlatsBtns();
  renderAdminList();
}

function renderGenerosBtns() {
  const wrap = document.getElementById('admin-genero-btns');
  wrap.innerHTML = GENEROS.map(g => `
    <button type="button" class="genero-btn" data-g="${g.nombre}"
            onclick="selectAdminGenero(this, '${g.nombre}')">
      ${g.emoji} ${g.nombre}
    </button>`).join('');
}

function renderPlatsBtns() {
  const wrap = document.getElementById('admin-plat-btns');
  wrap.innerHTML = PLATAFORMAS_LIST.map(p => `
    <button type="button" class="plat-selector-btn" data-p="${p}"
            onclick="toggleAdminPlat(this,'${p}')">
      ${platIcon(p)} ${p}
    </button>`).join('');
}

function selectAdminGenero(btn, g) {
  document.querySelectorAll('#admin-genero-btns .genero-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedGenero = g;
  document.getElementById('g-genero').value = g;
  document.getElementById('genero-error').style.display = 'none';
}

function toggleAdminPlat(btn, p) {
  if (selectedPlats.has(p)) { selectedPlats.delete(p); btn.classList.remove('selected'); }
  else { selectedPlats.add(p); btn.classList.add('selected'); }
}

function addGame(e) {
  e.preventDefault();
  if (!selectedGenero) {
    document.getElementById('genero-error').style.display = '';
    return;
  }

  const newGame = {
    id: Date.now(),
    nombre:      document.getElementById('g-nombre').value.trim(),
    precio:      parseFloat(document.getElementById('g-precio').value),
    stock:       parseInt(document.getElementById('g-stock').value),
    descripcion: document.getElementById('g-desc').value.trim(),
    genero:      selectedGenero,
    imagen:      document.getElementById('g-imagen').value.trim() || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=600&q=80',
    desarrollador: document.getElementById('g-dev').value.trim() || 'Unknown',
    descuento:   parseInt(document.getElementById('g-descuento').value) || 0,
    videoUrl:    document.getElementById('g-video').value.trim() || null,
    plataformas: selectedPlats.size > 0 ? [...selectedPlats] : ['PC'],
    ventas: 0
  };

  // Save extras to localStorage
  const extras = JSON.parse(localStorage.getItem('gk_admin_juegos') || '[]');
  extras.push(newGame);
  localStorage.setItem('gk_admin_juegos', JSON.stringify(extras));

  adminJuegos.push(newGame);
  JUEGOS.push(newGame);

  renderAdminList();
  document.getElementById('form-add-game').reset();
  selectedGenero = '';
  selectedPlats  = new Set();
  document.querySelectorAll('#admin-genero-btns .genero-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#admin-plat-btns .plat-selector-btn').forEach(b => b.classList.remove('selected'));

  mostrarToast(`✅ "${newGame.nombre}" añadido correctamente`);
}

function deleteGame(id) {
  if (!confirm('¿Eliminar este juego?')) return;

  adminJuegos = adminJuegos.filter(j => j.id !== id);
  // Also remove from extras if it's a user-added game
  const extras = JSON.parse(localStorage.getItem('gk_admin_juegos') || '[]').filter(j => j.id !== id);
  localStorage.setItem('gk_admin_juegos', JSON.stringify(extras));
  renderAdminList();
  mostrarToast('🗑️ Juego eliminado');
}

function renderAdminList() {
  const con = document.getElementById('admin-juegos-list');
  document.getElementById('admin-count').textContent = `${adminJuegos.length} juegos`;

  if (!adminJuegos.length) {
    con.innerHTML = '<div class="col-12 text-center py-4" style="color:#64748b;">No hay juegos</div>';
    return;
  }

  con.innerHTML = adminJuegos.map(j => `
    <div class="col-lg-4 col-md-6 mb-4">
      <div class="game-card">
        <div class="card-img-wrap" style="cursor:default;">
          <img src="${j.imagen}" alt="${j.nombre}" loading="lazy">
          ${j.descuento > 0 ? `<div class="discount-badge">-${j.descuento}%</div>` : ''}
          ${j.stock === 0 ? `<div class="agotado-overlay"><span class="badge-agotado">AGOTADO</span></div>` : ''}
        </div>
        <div class="card-body">
          <div class="genre-badge">${j.genero}</div>
          <h6 class="card-title">${j.nombre}</h6>
          <p class="card-text">${(j.descripcion||'').slice(0,80)}…</p>
          <div class="developer-tag">🏢 ${j.desarrollador}</div>
          <div class="mb-2">${renderPlataformas(j.plataformas)}</div>
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mt-2">
            <div>
              ${renderPrecio(j)}
              <div style="font-size:0.78rem;color:#64748b;margin-top:2px;">📦 Stock: ${j.stock}</div>
            </div>
            <button class="btn btn-sm" style="background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);border-radius:6px;"
                    onclick="deleteGame(${j.id})" title="Eliminar">🗑️</button>
          </div>
        </div>
      </div>
    </div>`).join('');
}
</script>
</body>
</html>
