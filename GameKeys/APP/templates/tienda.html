</head>
<body>

      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link active" href="/tienda.html">Tienda</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Categorías</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/pcgaming.html">🖥️ PC Gaming</a></li>
            <li><a class="dropdown-item" href="/ofertas.html">🔥 Ofertas</a></li>
            <li><a class="dropdown-item" href="/topventas.html">⭐ Top Ventas</a></li>
          </ul>
        </li>
        <li class="nav-item"><a class="nav-link" href="/gift-cards.html">🎁 Gift Cards</a></li>
      </ul>
      <div class="search-wrap me-2">
        <input type="text" id="buscador-input" class="form-control search-input" placeholder="Buscar juegos..." autocomplete="off">

      </div>
      <button id="btn-buscar" class="btn btn-violeta btn-sm me-3">Buscar</button>
      <a href="/carrito.html" class="btn btn-outline-violeta btn-sm me-2 cart-badge-wrap">

</nav>

<div class="container py-5">
  <h1 class="section-title">🕹️ Tienda de <span>Claves</span></h1>

  <!-- Filter bar -->
  <div class="search-bar-page">
    <div class="row g-3 align-items-center">
      <div class="col-md-4">
        <input type="text" id="tienda-search" class="form-control" placeholder="🔍 Buscar en tienda..." oninput="filtrarJuegos()">
      </div>
      <div class="col-md-6">
        <div class="d-flex flex-wrap gap-2" id="genero-btns">
          <button class="genero-btn active" data-genero="todos" onclick="setGenero(this,'todos')">Todos</button>
        </div>
      </div>
      <div class="col-md-2">
        <div class="form-check stock-toggle">
          <input class="form-check-input" type="checkbox" id="solo-stock" onchange="filtrarJuegos()">
          <label class="form-check-label" for="solo-stock">Solo con stock</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Available games -->
  <div class="mb-3 d-flex align-items-center gap-2">
    <span class="pulse-dot pulse-green"></span>
    <h5 class="mb-0 fw-700" style="color:#f1f5f9;">Disponibles</h5>
    <span class="badge" style="background:rgba(34,197,94,0.2);color:#22c55e;" id="cnt-disponibles">0</span>
  </div>
  <div class="row" id="juegos-disponibles"></div>

  <!-- Out of stock -->
  <div id="section-agotados" class="mt-4">
    <div class="mb-3 d-flex align-items-center gap-2">
      <span class="pulse-dot pulse-red"></span>
      <h5 class="mb-0 fw-700" style="color:#f1f5f9;">Sin stock</h5>
      <span class="badge" style="background:rgba(239,68,68,0.2);color:#ef4444;" id="cnt-agotados">0</span>
    </div>
    <div class="row" id="juegos-agotados"></div>
  </div>

  <!-- Empty state -->
  <div id="empty-state" class="empty-state" style="display:none;">
    <div class="empty-icon">🔍</div>
    <h5>Sin resultados</h5>
    <p>Prueba con otro término de búsqueda o cambia los filtros</p>
    <button class="btn btn-violeta" onclick="limpiarFiltros()">Limpiar filtros</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalJuego" tabindex="-1"></div>

<footer class="footer-main mt-5">
  <div class="container text-center" style="font-size:0.8rem;color:#475569;">
    © 2024 GameKeys. Todos los derechos reservados.
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
<script>
let generoActivo = 'todos';

function initPagina() {
  // Render genre buttons
  const btnsWrap = document.getElementById('genero-btns');
  GENEROS.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'genero-btn';
    btn.dataset.genero = g.nombre;
    btn.textContent = `${g.emoji} ${g.nombre}`;
    btn.onclick = () => setGenero(btn, g.nombre);
    btnsWrap.appendChild(btn);
  });

  // Apply URL params
  const params = new URLSearchParams(location.search);
  const qParam  = params.get('q');
  const gParam  = params.get('genero');
  const fParam  = params.get('filtro');
  const pParam  = params.get('plataforma');

  if (qParam) document.getElementById('tienda-search').value = qParam;
  if (gParam) {
    generoActivo = gParam;
    document.querySelectorAll('.genero-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.genero === gParam);
    });
  }

  filtrarJuegos(fParam, pParam);
}

function setGenero(btn, g) {
  generoActivo = g;
  document.querySelectorAll('.genero-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtrarJuegos();
}

function filtrarJuegos(filtroParam, plataformaParam) {
  const q          = (document.getElementById('tienda-search').value || '').toLowerCase();
  const soloStock  = document.getElementById('solo-stock').checked;
  const filtro     = filtroParam || new URLSearchParams(location.search).get('filtro');
  const plataforma = plataformaParam || new URLSearchParams(location.search).get('plataforma');

  let lista = [...JUEGOS];

  // Filter by search
  if (q) lista = lista.filter(j => j.nombre.toLowerCase().includes(q) || j.genero.toLowerCase().includes(q));

  // Filter by genre
  if (generoActivo && generoActivo !== 'todos') {
    lista = lista.filter(j => j.genero === generoActivo);
  }

  // Filter by platform
  if (plataforma) {
    const p = plataforma.toLowerCase();
    lista = lista.filter(j => j.plataformas.some(pl => pl.toLowerCase().includes(p)));
  }

  // Special filters
  if (filtro === 'oferta') lista = lista.filter(j => j.descuento > 0);
  if (filtro === 'topventas') lista = lista.sort((a, b) => b.ventas - a.ventas);

  // Stock filter
  let disponibles = lista.filter(j => j.stock > 0);
  let agotados    = soloStock ? [] : lista.filter(j => j.stock === 0);

  const conDisp = document.getElementById('juegos-disponibles');
  const conAgot = document.getElementById('juegos-agotados');
  const empty   = document.getElementById('empty-state');
  const secAg   = document.getElementById('section-agotados');

  document.getElementById('cnt-disponibles').textContent = disponibles.length;
  document.getElementById('cnt-agotados').textContent    = agotados.length;

  if (!disponibles.length && !agotados.length) {
    conDisp.innerHTML = '';
    conAgot.innerHTML = '';
    empty.style.display = '';
    secAg.style.display = 'none';
    return;
  }
  empty.style.display = 'none';

  conDisp.innerHTML = disponibles.length
    ? disponibles.map(j => crearGameCard(j, false)).join('')
    : '<div class="col-12 text-center py-3" style="color:#64748b;">Ningún juego disponible con estos filtros</div>';

  if (agotados.length) {
    secAg.style.display = '';
    conAgot.innerHTML = agotados.map(j => crearGameCard(j, true)).join('');
  } else {
    secAg.style.display = soloStock ? 'none' : '';
    conAgot.innerHTML = '';
  }
}

function limpiarFiltros() {
  document.getElementById('tienda-search').value = '';
  document.getElementById('solo-stock').checked = false;
  generoActivo = 'todos';
  document.querySelectorAll('.genero-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.genero === 'todos');
  });
  history.replaceState({}, '', location.pathname);
  filtrarJuegos();
}
</script>
</body>
</html>
